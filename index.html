<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>DevOps Demo E-Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .product-card { height: 100%; transition: transform 0.2s; }
        .product-card:hover { transform: scale(1.02); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <span class="navbar-brand mb-0 h1">🛠️ DevOps Pipelines Learning Store</span>
    </div>
</nav>

<div class="container">
    <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
        <strong th:text="${message}">Order Placed!</strong>
    </div>

    <div class="row">
        <!-- Products Column -->
        <div class="col-md-8">
            <h3 class="mb-4">Available Catalog</h3>
            <div class="row row-cols-1 row-cols-md-2 g-4">
                <div class="col" th:each="product : ${products}">
                    <div class="card product-card">
                        <div class="card-body d-flex flex-column justify-content-between">
                            <div>
                                <span class="badge bg-secondary mb-2" th:text="${product.category}">Category</span>
                                <h5 class="card-title" th:text="${product.name}">Product Name</h5>
                                <p class="card-text text-success fw-bold" th:text="'$' + ${product.price}">$0.00</p>
                            </div>
                            <div class="mt-3">
                                <p class="text-muted small" th:text="'In Stock: ' + ${product.stock}">In Stock: 10</p>
                                <form th:action="@{/add-to-cart}" method="post">
                                    <input type="hidden" name="id" th:value="${product.id}" />
                                    <button type="submit" class="btn btn-primary btn-sm w-100" th:disabled="${product.stock <= 0}">
                                        Add to Cart
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Shopping Cart Column -->
        <div class="col-md-4">
            <div class="card position-sticky" style="top: 20px;">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">Shopping Cart</h5>
                </div>
                <div class="card-body">
                    <div th:if="${#lists.isEmpty(cart)}">
                        <p class="text-center text-muted my-4">Your cart is empty.</p>
                    </div>
                    <div th:if="${!#lists.isEmpty(cart)}">
                        <ul class="list-group list-group-flush mb-3">
                            <li class="list-group-item d-flex justify-content-between align-items-center" th:each="item : ${cart}">
                                <div>
                                    <h6 class="my-0" th:text="${item.product.name}">Item</h6>
                                    <small class="text-muted" th:text="'Qty: ' + ${item.quantity}"></small>
                                </div>
                                <span class="text-muted" th:text="'$' + ${item.product.price * item.quantity}">$0.00</span>
                            </li>
                        </ul>
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <strong>Total Amount:</strong>
                            <strong class="text-success fs-5" th:text="'$' + ${#numbers.formatDecimal(total, 1, 2)}">$0.00</strong>
                        </div>
                        <form th:action="@{/checkout}" method="post">
                            <button type="submit" class="btn btn-success w-100">Checkout & Place Order</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
